name: 🚀 Deploy SNT CRM

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Ручной запуск

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ========== ПРОВЕРКА КОДА ==========
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password_123
          POSTGRES_DB: test_snt_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout код
        uses: actions/checkout@v4

      - name: 🐍 Установка Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 💾 Кэширование pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📦 Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest-django pytest-cov

      - name: 🔍 Проверка стиля кода
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-complexity=15 --max-line-length=127 --statistics

      - name: 🗄️ Подготовка тестовой БД
        env:
          DATABASE_URL: postgres://test_user:test_password_123@localhost:5432/test_snt_db
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: 'False'
        run: |
          cd SNT
          python manage.py migrate --noinput

      - name: 🧪 Запуск тестов
        env:
          DATABASE_URL: postgres://test_user:test_password_123@localhost:5432/test_snt_db
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: 'False'
        run: |
          cd SNT
          python manage.py test --verbosity=2 --parallel

  # ========== ДЕПЛОЙ НА СЕРВЕР ==========
  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    
    steps:
      - name: 🔔 Начало деплоя
        run: |
          echo "🚀 Начинаем деплой на snt-crm.ru"
          echo "📝 Коммит: ${{ github.event.head_commit.message }}"
          echo "👤 Автор: ${{ github.event.head_commit.author.name }}"

      - name: 🚀 Деплой через SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 15m
          script: |
            cd /home/aiv/SNT/SNT-crm
            bash deploy.sh 2>&1 | tee /tmp/deploy_$(date +%Y%m%d_%H%M%S).log

      - name: 🏥 Проверка здоровья
        if: success()
        run: |
          echo "Ждём 5 секунд для полной загрузки..."
          sleep 5
          echo "Проверяем сайт..."
          for i in {1..3}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://snt-crm.ru/ 2>/dev/null || echo "000")
            echo "Попытка $i: HTTP $STATUS"
            if [ "$STATUS" == "200" ] || [ "$STATUS" == "302" ]; then
              echo "✅ Сайт доступен"
              exit 0
            fi
            sleep 3
          done
          echo "❌ Сайт недоступен после 3 попыток"
          exit 1

      - name: 📊 Статус деплоя
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Деплой успешно завершён: https://snt-crm.ru"
          else
            echo "❌ Деплой завершился с ошибкой"
            echo "Проверьте логи на сервере: cat /tmp/deploy_*.log"
          fi