name: 🚀 Deploy SNT CRM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Проверка кода
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password_123
          POSTGRES_DB: test_snt_db
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout код
        uses: actions/checkout@v4

      - name: 🐍 Установка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Установка зависимостей
        run: |
          cd SNT
          pip install -r requirements.txt
          pip install flake8 pytest-django

      - name: 🔍 Проверка кода
        run: |
          cd SNT
          flake8 . --count --max-complexity=10 --statistics || true

      - name: 🧪 Запуск тестов
        env:
          DATABASE_URL: postgres://test_user:test_password_123@localhost:5432/test_snt_db
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: 'False'
        run: |
          cd SNT
          python manage.py migrate --noinput
          python manage.py test --verbosity=2 || true

  # Деплой на сервер
  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 🚀 Деплой на сервер
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /home/aiv/SNT/SNT-crm
            bash deploy.sh